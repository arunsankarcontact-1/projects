deployment:
  replicas: 2

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

service:
  type: NodePort
  nodePorts:
    web: 30081
    websecure: 30444

ports:
  web:
    port: 8000
  websecure:
    port: 8443

ingressClass:
  enabled: true
  isDefaultClass: false
  name: traefik

logs:
  general:
    level: INFO

metrics:
  prometheus:
    enabled: true

providers:
  kubernetesIngress:
    enabled: true
